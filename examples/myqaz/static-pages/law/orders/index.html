<ul><li><a href="/law/orders/ministries/">Министерства</a> — 630</li><li><a href="/law/orders/other/">Другие</a> — 299</li></ul>
<div id="pg-fb" class="feedback">
<p class="feedback-q">Была ли эта страница полезной?</p>
<div class="fb-btns">
<button type="button" class="fb-btn" data-v="1">Да</button>
<button type="button" class="fb-btn" data-v="0">Нет</button>
</div>
<p class="fb-ok" style="display:none">Спасибо за отзыв!</p>
<div class="fb-form" style="display:none">
<textarea placeholder="Что можно улучшить?" maxlength="500" rows="3"></textarea>
<button type="button" class="fb-btn fb-send">Отправить</button>
</div>
</div>
<script>
(function(){
var fb=document.getElementById('pg-fb');if(!fb)return;
try{if(localStorage.getItem('fb:'+location.pathname)){fb.style.display='none';return}}catch(e){}
var btns=fb.querySelector('.fb-btns'),ok=fb.querySelector('.fb-ok'),
    form=fb.querySelector('.fb-form'),sent=false;
function track(v,c){
var u='/_/fb?p='+location.pathname+'&v='+v+'&r='+Math.random();
if(c)u+='&c='+encodeURIComponent(c);new Image().src=u;
try{localStorage.setItem('fb:'+location.pathname,'1')}catch(e){}
}
var bb=btns.querySelectorAll('button');
for(var i=0;i<bb.length;i++){bb[i].addEventListener('click',function(){
if(sent)return;var v=this.getAttribute('data-v');
if(v==='1'){sent=true;track('1');btns.style.display='none';ok.style.display=''}
else{btns.style.display='none';form.style.display='';form.querySelector('textarea').focus()}
})}
fb.querySelector('.fb-send').addEventListener('click',function(){
if(sent)return;sent=true;
track('0',fb.querySelector('textarea').value);
form.style.display='none';ok.style.display='';
})
})();
</script>
